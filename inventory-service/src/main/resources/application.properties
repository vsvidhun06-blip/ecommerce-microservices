spring.application.name=inventory-service
server.port=8085

# PostgreSQL (overridden by SPRING_DATASOURCE_* env in docker-compose)
spring.datasource.url=jdbc:postgresql://localhost:5436/inventory_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Kafka (overridden by SPRING_KAFKA_BOOTSTRAP_SERVERS env in docker-compose).
# Producer + consumer are configured here so the Saga listener (added next
# phase) is ready; no listener is active yet at this phase.
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=inventory-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false

# Eureka (overridden by EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE env in docker-compose)
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# Actuator
management.endpoints.web.exposure.include=health,info,metrics

# Phase 7: distributed tracing (Micrometer Tracing + Brave -> Zipkin).
# Endpoint overridden by MANAGEMENT_ZIPKIN_TRACING_ENDPOINT in docker-compose.
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans
# Propagate trace context across Kafka (saga events).
spring.kafka.template.observation-enabled=true
spring.kafka.listener.observation-enabled=true

logging.level.com.ecommerce.inventoryservice=INFO
