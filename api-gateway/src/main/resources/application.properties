spring.application.name=api-gateway
server.port=8080

# Service route URIs are placeholders so docker-compose can inject the in-network
# hostnames (PRODUCT_SERVICE_URL=http://product-service:8081, etc.); the defaults
# target localhost for running the gateway outside Docker.
# Product Service Route
spring.cloud.gateway.routes[0].id=product-service
spring.cloud.gateway.routes[0].uri=${PRODUCT_SERVICE_URL:http://localhost:8081}
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/v1/products/**

# User Service Route
spring.cloud.gateway.routes[1].id=user-service
spring.cloud.gateway.routes[1].uri=${USER_SERVICE_URL:http://localhost:8082}
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/v1/auth/**,/api/v1/users/**

# Order Service Route
spring.cloud.gateway.routes[2].id=order-service
spring.cloud.gateway.routes[2].uri=${ORDER_SERVICE_URL:http://localhost:8083}
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/v1/orders/**

# Notification Service Route
spring.cloud.gateway.routes[3].id=notification-service
spring.cloud.gateway.routes[3].uri=${NOTIFICATION_SERVICE_URL:http://localhost:8084}
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/v1/notifications/**

# Phase 8: Redis-backed RequestRateLimiter applied to every route as a default
# filter. Token bucket per client IP (see GatewayConfig#ipKeyResolver): steady
# 10 req/s, bursts up to 20; over-limit requests get HTTP 429. Redis host/port
# are overridden by SPRING_DATA_REDIS_* env in docker-compose.
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.cloud.gateway.default-filters[0].name=RequestRateLimiter
spring.cloud.gateway.default-filters[0].args.redis-rate-limiter.replenishRate=10
spring.cloud.gateway.default-filters[0].args.redis-rate-limiter.burstCapacity=20
spring.cloud.gateway.default-filters[0].args.redis-rate-limiter.requestedTokens=1
spring.cloud.gateway.default-filters[0].args.key-resolver=#{@ipKeyResolver}

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Phase 7: distributed tracing (Micrometer Tracing + Brave -> Zipkin). The
# gateway is the trace entrypoint; downstream services continue the trace.
# Endpoint overridden by MANAGEMENT_ZIPKIN_TRACING_ENDPOINT in docker-compose.
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans

# Logging
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.com.ecommerce.apigateway=DEBUG