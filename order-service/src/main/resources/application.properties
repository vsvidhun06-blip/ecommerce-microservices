spring.application.name=order-service
spring.datasource.url=jdbc:postgresql://localhost:5434/order_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
server.port=8083

# Kafka (overridden by SPRING_KAFKA_BOOTSTRAP_SERVERS env in docker-compose).
# order-service publishes ORDER_CREATED / ORDER_CANCELLED and consumes
# INVENTORY_RESERVED / INVENTORY_FAILED (see OrderSagaHandler).
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=order-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false

# Eureka (overridden by EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE env in docker-compose)
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# Product service base URL. lb:// is resolved by Spring Cloud LoadBalancer via
# Eureka (logical service id, not host:port). Overridable with PRODUCT_SERVICE_URL.
product.service.url=lb://product-service

# ==================== Phase 3: resilience + thread-pool tuning ====================

# Thread-pool bulkhead isolating the product-service call (see ProductClient).
# Lookups run on this dedicated, bounded pool with a bounded queue so a slow or
# down product service cannot starve the Tomcat request threads; once the queue
# fills, calls are rejected fast (fallback) instead of piling up.
resilience4j.thread-pool-bulkhead.instances.productService.core-thread-pool-size=10
resilience4j.thread-pool-bulkhead.instances.productService.max-thread-pool-size=20
resilience4j.thread-pool-bulkhead.instances.productService.queue-capacity=50
resilience4j.thread-pool-bulkhead.instances.productService.keep-alive-duration=1s

# Server (Tomcat) request-handling pool. Sized so the service degrades
# predictably under load rather than spawning unbounded threads.
server.tomcat.threads.max=150
server.tomcat.threads.min-spare=20
server.tomcat.accept-count=100
server.tomcat.max-connections=8192

# Circuit breaker around the product lookup: COUNT-based window of 10 calls
# (min 5), trip at >=50% failures, stay open 10s, then probe with 3 half-open
# calls before closing. 4xx responses are client errors, not outages -> ignored.
resilience4j.circuitbreaker.instances.productService.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.productService.sliding-window-size=10
resilience4j.circuitbreaker.instances.productService.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.productService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.productService.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.productService.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.productService.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.instances.productService.register-health-indicator=true
resilience4j.circuitbreaker.instances.productService.ignore-exceptions=org.springframework.web.client.HttpClientErrorException

# Retry transient product-service failures (connect/timeout, 5xx) with
# exponential back-off. A 4xx, an open breaker, or a full bulkhead are terminal
# here -> not retried (they fall straight through to the fallback).
resilience4j.retry.instances.productService.max-attempts=3
resilience4j.retry.instances.productService.wait-duration=200ms
resilience4j.retry.instances.productService.enable-exponential-backoff=true
resilience4j.retry.instances.productService.exponential-backoff-multiplier=2
resilience4j.retry.instances.productService.retry-exceptions=org.springframework.web.client.ResourceAccessException,org.springframework.web.client.HttpServerErrorException
resilience4j.retry.instances.productService.ignore-exceptions=org.springframework.web.client.HttpClientErrorException,io.github.resilience4j.circuitbreaker.CallNotPermittedException,io.github.resilience4j.bulkhead.BulkheadFullException

# Actuator: expose health detail + the resilience4j endpoints/metrics.
management.endpoints.web.exposure.include=health,info,metrics,bulkheads,threadpoolbulkheads,circuitbreakers,retries
management.endpoint.health.show-details=always
management.health.circuitbreakers.enabled=true

logging.level.com.ecommerce.orderservice=DEBUG
logging.level.io.github.resilience4j=INFO