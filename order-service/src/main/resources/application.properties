spring.application.name=order-service
spring.datasource.url=jdbc:postgresql://localhost:5434/order_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
server.port=8083

# Kafka (overridden by SPRING_KAFKA_BOOTSTRAP_SERVERS env in docker-compose).
# order-service publishes ORDER_CREATED / ORDER_CANCELLED and consumes
# INVENTORY_RESERVED / INVENTORY_FAILED (see OrderSagaHandler).
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=order-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false

# Eureka (overridden by EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE env in docker-compose)
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# Actuator
management.endpoints.web.exposure.include=health,info,metrics

logging.level.com.ecommerce.orderservice=DEBUG