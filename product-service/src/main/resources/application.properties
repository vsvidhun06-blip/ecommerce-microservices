spring.application.name=product-service
# 8081 matches the gateway route and docker-compose (SERVER_PORT); the prior
# 8083 collided with order-service.
server.port=8081

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/ecommerce
spring.datasource.username=ecommerce
spring.datasource.password=ecommerce123
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Kafka
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false

# Redis cache-aside (overridden by SPRING_DATA_REDIS_* env in docker-compose)
spring.data.redis.host=localhost
spring.data.redis.port=6379
# Product cache entry TTL.
product.cache.ttl-seconds=600

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true
eureka.instance.prefer-ip-address=true

# Actuator
management.endpoints.web.exposure.include=health,info,metrics

# Phase 7: distributed tracing (Micrometer Tracing + Brave -> Zipkin).
# Endpoint overridden by MANAGEMENT_ZIPKIN_TRACING_ENDPOINT in docker-compose.
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans
# Propagate trace context across Kafka producers/consumers.
spring.kafka.template.observation-enabled=true
spring.kafka.listener.observation-enabled=true

# Logging
logging.level.org.springframework.kafka=INFO
logging.level.com.ecommerce.productservice=INFO